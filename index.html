<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가비 주간 계획표</title>
  <style>
    :root {
      --bg: #fbf7f1;
      --paper: #fffdf9;
      --card: #f4eadb;
      --line: #d08a5a;
      --line-soft: #ead9c6;
      --text: #3f2a1f;
      --muted: #8c6b56;
      --accent: #c98053;
      --accent-deep: #b66e45;
      --shadow: 0 18px 40px rgba(118, 74, 45, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, #f7f0e6 0%, #fbf7f1 220px),
        var(--bg);
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 36px 20px 72px;
    }

    .hero {
      background: var(--paper);
      border: 1px solid var(--line-soft);
      box-shadow: var(--shadow);
      border-radius: 28px;
      overflow: hidden;
    }

    .hero-band {
      height: 18px;
      background: linear-gradient(90deg, var(--accent) 0%, #deb28d 100%);
    }

    .hero-body {
      padding: 34px 24px 28px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .intro {
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.75;
    }

    .quote {
      margin-top: 24px;
      padding: 20px;
      background: var(--card);
      border-left: 4px solid var(--accent);
      border-radius: 18px;
      color: var(--text);
      font-size: 17px;
      line-height: 1.8;
    }

    .section {
      margin-top: 28px;
      background: var(--paper);
      border: 1px solid var(--line-soft);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .section-title {
      margin: 0 0 18px;
      font-size: 22px;
      color: var(--accent-deep);
      letter-spacing: -0.02em;
    }

    .plan-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 14px;
    }

    .plan-item a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 18px 18px 20px;
      border: 1px solid var(--line-soft);
      border-radius: 18px;
      background: linear-gradient(180deg, #fffdfa 0%, #faf4eb 100%);
      color: inherit;
      text-decoration: none;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .plan-item a:hover {
      transform: translateY(-2px);
      border-color: var(--line);
      box-shadow: 0 12px 24px rgba(176, 111, 73, 0.12);
    }

    .plan-main {
      min-width: 0;
    }

    .plan-week {
      display: block;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .plan-desc {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .plan-arrow {
      flex: 0 0 auto;
      color: var(--accent);
      font-size: 22px;
      font-weight: 700;
    }

    .note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .footer {
      margin-top: 26px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 640px) {
      .page {
        padding: 20px 14px 48px;
      }

      .hero-body,
      .section {
        padding: 20px 18px;
      }

      h1 {
        font-size: 28px;
      }

      .quote {
        font-size: 15px;
      }

      .plan-item a {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-band"></div>
      <div class="hero-body">
        <p class="eyebrow">햇살 · 포근나루</p>
        <h1>가비 주간 계획표</h1>
        <p class="intro">
          한 주의 일정과 독서, 마감과 루틴을 차분하게 정리해 보는 공간입니다.
          모바일에서 바로 열어보고, 지나간 계획은 기록으로 남길 수 있도록 구성했습니다.
        </p>
        <div class="quote">
          먼저 건넨 사람처럼, 이번 주를 조금 더 다
