<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>가비 주간 계획표 | 포근나루</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF3EA;--apricot:#F5EBE0;--terra:#C8845A;--terra-deep:#C4763A;--brown:#3C2415;
  --paper:#fffdf9;--muted:#9c7a65;--line:#e8d5c2;
}
body{background:var(--cream);font-family:'Nanum Myeongjo',Georgia,serif;color:var(--brown);}
.wrap{max-width:680px;margin:0 auto;padding:48px 24px 72px;}
.brand-mark{display:flex;align-items:center;gap:10px;margin-bottom:48px;}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--terra);flex-shrink:0;}
.brand-name{font-family:'Gowun Dodum',sans-serif;font-size:13px;color:var(--terra);letter-spacing:0.12em;}
.hero{position:relative;padding:0 0 52px;}
.hero-overline{font-family:'Gowun Dodum',sans-serif;font-size:12px;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase;margin-bottom:20px;}
.hero-title{font-size:40px;font-weight:800;line-height:1.15;letter-spacing:-0.03em;margin-bottom:28px;}
.hero-title em{font-style:normal;color:var(--terra);}
.hero-divider{width:40px;height:2px;background:var(--terra);margin-bottom:28px;border-radius:1px;}
.hero-quote{font-size:17px;line-height:2;color:var(--brown);max-width:480px;}
.hero-quote cite{display:block;margin-top:16px;font-style:normal;font-family:'Gowun Dodum',sans-serif;font-size:12px;letter-spacing:0.1em;color:var(--muted);}
.hero-deco{position:absolute;right:0;top:-8px;width:90px;height:90px;border-radius:50%;border:1.5px solid var(--line);opacity:0.5;pointer-events:none;}
.hero-deco2{position:absolute;right:20px;top:12px;width:50px;height:50px;border-radius:50%;border:1.5px solid var(--terra);opacity:0.18;pointer-events:none;}
.divider-line{width:100%;height:1px;background:var(--line);margin:0 0 48px;}
.section-label{font-family:'Gowun Dodum',sans-serif;font-size:11px;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;margin-bottom:24px;}
.week-grid{display:grid;gap:12px;}
.week-card{display:flex;align-items:stretch;border:1px solid var(--line);border-radius:16px;background:var(--paper);overflow:hidden;text-decoration:none;color:var(--brown);transition:border-color .2s,transform .18s;}
.week-card:hover{border-color:var(--terra);transform:translateY(-2px);}
.week-card.current{border-color:var(--terra);background:linear-gradient(135deg,#fffdf9 0%,#fdf5ea 100%);}
.week-card-accent{width:4px;background:var(--terra);flex-shrink:0;opacity:0.3;transition:opacity .2s;}
.week-card:hover .week-card-accent,.week-card.current .week-card-accent{opacity:1;}
.week-card-body{padding:20px 22px;flex:1;min-width:0;}
.week-card-num{font-family:'Gowun Dodum',sans-serif;font-size:11px;letter-spacing:0.15em;color:var(--muted);margin-bottom:6px;}
.week-card-title{font-size:18px;font-weight:700;line-height:1.3;margin-bottom:6px;}
.week-card-sub{font-size:13px;color:var(--muted);line-height:1.6;}
.week-card-right{padding:20px 20px 20px 0;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:8px;}
.week-card-arrow{color:var(--terra);font-size:18px;opacity:0.5;transition:opacity .2s;}
.week-card:hover .week-card-arrow,.week-card.current .week-card-arrow{opacity:1;}
.badge-now{font-family:'Gowun Dodum',sans-serif;font-size:10px;letter-spacing:0.08em;color:var(--terra-deep);background:var(--apricot);border:1px solid var(--line);border-radius:20px;padding:3px 9px;white-space:nowrap;}
.note-band{margin-top:48px;padding:28px 28px 28px 32px;background:var(--apricot);border-radius:18px;border-left:3px solid var(--terra);position:relative;overflow:hidden;}
.note-band-bg{position:absolute;right:-16px;bottom:-20px;width:80px;height:80px;border-radius:50%;background:var(--terra);opacity:0.06;}
.note-band p{font-size:15px;line-height:1.9;color:var(--brown);}
.note-band p+p{margin-top:10px;}
.note-band strong{font-weight:700;color:var(--terra-deep);}
.footer{margin-top:52px;display:flex;align-items:center;justify-content:space-between;padding-top:24px;border-top:1px solid var(--line);}
.footer-left{font-family:'Gowun Dodum',sans-serif;font-size:12px;color:var(--muted);}
.footer-right{font-family:'Gowun Dodum',sans-serif;font-size:12px;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand-mark">
    <div class="brand-dot"></div>
    <span class="brand-name">햇살 · 포근나루</span>
  </div>
  <div class="hero">
    <div class="hero-deco"></div>
    <div class="hero-deco2"></div>
    <p class="hero-overline">Weekly Planner · 가비</p>
    <h1 class="hero-title">한 주를 <em>천천히</em><br>살아가는 법</h1>
    <div class="hero-divider"></div>
    <p class="hero-quote">
      서두르지 않아도 됩니다.<br>
      쓰고 읽고 쉬고 또 쓰는 것,<br>
      그 작은 반복이 당신의 나날을 만듭니다.
      <cite>— 가비 주간 계획표</cite>
    </p>
  </div>
  <div class="divider-line"></div>
  <p class="section-label" id="section-label">Weekly Plans</p>
  <div class="week-grid" id="week-grid"></div>
  <div class="note-band">
    <div class="note-band-bg"></div>
    <p><strong>지나간 계획은 기록으로 남습니다.</strong></p>
    <p>완벽하지 않아도 괜찮습니다. 쓰다 멈췄던 날도, 계획이 어긋난 날도 — 모두 당신이 살아낸 한 주입니다.</p>
  </div>
  <div class="footer">
    <span class="footer-left">pognaru_studio</span>
    <span class="footer-right" id="footer-year"></span>
  </div>
</div>
<script>
const WEEK_NAMES = [
  { title: "시작하는 주",   sub: "루틴을 세우고, 이번 주 읽을 책을 고릅니다" },
  { title: "깊어지는 주",   sub: "하나의 주제를 정해 천천히 파고듭니다" },
  { title: "쌓이는 주",     sub: "마감과 루틴, 두 가지를 함께 챙깁니다" },
  { title: "마무리하는 주", sub: "이번 달을 돌아보고 다음 달을 준비합니다" },
  { title: "넘치는 주",     sub: "조금 더 주어진 시간, 여유롭게 채웁니다" },
];

const KO_MONTH = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

function pad2(n){ return String(n).padStart(2,'0'); }

function getMondayWeeks(year, month) {
  const firstDay = new Date(year, month, 1);
  const dow = firstDay.getDay(); // 0=Sun
  // Monday on or before the 1st
  const offsetToMon = dow === 0 ? -6 : -(dow - 1);
  let cur = new Date(year, month, 1 + offsetToMon);
  const weeks = [];
  while (true) {
    const sun = new Date(cur.getTime() + 6 * 86400000);
    const monInMonth = cur.getMonth() === month && cur.getFullYear() === year;
    const sunInMonth = sun.getMonth() === month && sun.getFullYear() === year;
    if (!monInMonth && !sunInMonth) {
      if (cur > new Date(year, month + 1, 0)) break;
      cur = new Date(cur.getTime() + 7 * 86400000);
      continue;
    }
    weeks.push({ mon: new Date(cur), sun: new Date(sun) });
    cur = new Date(cur.getTime() + 7 * 86400000);
    if (!monInMonth && !sunInMonth) break;
    const nextSun = new Date(cur.getTime() + 6 * 86400000);
    const nextMonIn = cur.getMonth() === month && cur.getFullYear() === year;
    const nextSunIn = nextSun.getMonth() === month && nextSun.getFullYear() === year;
    if (!nextMonIn && !nextSunIn) break;
  }
  return weeks;
}

function isCurrentWeek(mon, sun) {
  const today = new Date();
  const t = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const m = new Date(mon.getFullYear(), mon.getMonth(), mon.getDate());
  const s = new Date(sun.getFullYear(), sun.getMonth(), sun.getDate());
  return t >= m && t <= s;
}

function render() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();

  document.getElementById('section-label').textContent = `${year}년 ${KO_MONTH[month]}`;
  document.getElementById('footer-year').textContent = String(year);

  const weeks = getMondayWeeks(year, month);
  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';

  weeks.forEach((w, i) => {
    const wNum = i + 1;
    const name = WEEK_NAMES[i] || { title: `${wNum}번째 주`, sub: '' };
    const slug = `${year}-${pad2(month + 1)}-week${wNum}.html`;
    const url = `https://pognaru.github.io/gabi-planner/${slug}`;
    const isCurrent = isCurrentWeek(w.mon, w.sun);

    const monM = w.mon.getMonth() + 1;
    const sunM = w.sun.getMonth() + 1;
    const dateRange = monM === sunM
      ? `${monM}월 ${w.mon.getDate()}일 — ${w.sun.getDate()}일`
      : `${monM}월 ${w.mon.getDate()}일 — ${sunM}월 ${w.sun.getDate()}일`;

    const a = document.createElement('a');
    a.className = 'week-card' + (isCurrent ? ' current' : '');
    a.href = url;
    a.innerHTML = `
      <div class="week-card-accent"></div>
      <div class="week-card-body">
        <p class="week-card-num">Week ${pad2(wNum)} · ${dateRange}</p>
        <p class="week-card-title">${name.title}</p>
        <p class="week-card-sub">${name.sub}</p>
      </div>
      <div class="week-card-right">
        ${isCurrent ? '<span class="badge-now">이번 주</span>' : ''}
        <span class="week-card-arrow">→</span>
      </div>
    `;
    grid.appendChild(a);
  });
}

render();
</script>
</body>
</html>
