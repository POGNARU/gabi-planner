<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>가비 월간 플래너 | 포근나루</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F1E7DA;
  --card:#FCF6ED;
  --ink:#3C2415;
  --muted:#A8917E;
  --faint:#C9B6A4;
  --terra:#C8845A;
  --terra-deep:#BE7544;
  --line:#EDE2D4;
  --soft:#F3EBDF;
  /* 활동 팔레트 */
  --c-mass:#E8973A;     /* 미사·신앙 */
  --c-service:#5BB0DD;  /* 전례·봉사 */
  --c-club:#E89AAE;     /* 독서모임 */
  --c-read:#B589D6;     /* 개인독서 */
  --c-class:#E6C24C;    /* 클래스·나루 */
  --c-deeper:#2E4D6E;   /* 디퍼·작업 */
  --sun:#CF8A6E;
  --sat:#6B8DB5;
}
body{
  background:var(--bg);min-height:100vh;
  font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
  color:var(--ink);
  display:flex;justify-content:center;
  padding:26px 16px 40px;
  -webkit-font-smoothing:antialiased;
}

/* ─── 시트 카드 ─── */
.sheet{
  width:100%;max-width:440px;background:var(--card);
  border-radius:30px;
  box-shadow:0 10px 40px rgba(60,36,21,.10), 0 2px 8px rgba(60,36,21,.05);
  padding:14px 26px 34px;
  position:relative;
}
.handle{width:46px;height:5px;border-radius:3px;background:#E0D2C2;margin:6px auto 22px;}

/* ─── 헤더 ─── */
.overline{font-size:11px;letter-spacing:0.22em;color:var(--muted);font-weight:600;margin-bottom:8px;}
.head-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:26px;}
.month-title{font-family:'Gowun Batang',serif;font-size:38px;font-weight:700;line-height:1;color:var(--ink);}
.month-year{font-family:'Gowun Batang',serif;font-size:19px;color:var(--muted);margin-left:10px;font-weight:400;}
.nav-btns{display:flex;gap:14px;}
.nav-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;line-height:1;padding:4px 2px;transition:color .2s;font-family:'Gowun Batang',serif;}
.nav-btn:hover{color:var(--terra);}

/* ─── 달력 ─── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px 0;}
.cal-dow{text-align:center;font-size:12px;color:var(--muted);padding:0 0 12px;font-weight:500;}
.cal-dow.s-sun{color:var(--sun);}
.cal-dow.s-sat{color:var(--sat);}
.cal-day{
  position:relative;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;border-radius:50%;user-select:none;
  transition:background .15s;
}
.cal-num{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;transition:background .15s,color .15s;}
.cal-day:hover .cal-num{background:var(--soft);}
.cal-day.today .cal-num{background:var(--terra);color:#fff;font-weight:700;}
.cal-day.today:hover .cal-num{background:var(--terra-deep);}
.cal-day.selected:not(.today) .cal-num{box-shadow:inset 0 0 0 1.5px var(--terra);color:var(--terra-deep);}
.cal-day.other{color:var(--faint);opacity:.55;cursor:default;pointer-events:none;}
.cal-day.s-sun{color:var(--sun);}
.cal-day.s-sat{color:var(--sat);}
.cal-day.today.s-sun,.cal-day.today.s-sat{color:#fff;}
.day-dots{position:absolute;bottom:1px;display:flex;gap:3px;height:5px;}
.day-dot{width:5px;height:5px;border-radius:50%;}

/* ─── 구분선 ─── */
.divider{height:1px;background:var(--line);margin:26px 0;}

/* ─── 섹션 라벨 ─── */
.sec-label{font-size:13px;letter-spacing:0.04em;color:var(--muted);font-weight:600;margin-bottom:18px;}

/* ─── 독서 ─── */
.read-list{display:flex;flex-direction:column;gap:18px;}
.read-row{display:flex;align-items:center;gap:11px;}
.read-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.read-name{font-size:15px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.read-pips{display:flex;gap:5px;flex-shrink:0;}
.pip{width:11px;height:11px;border-radius:50%;cursor:pointer;transition:transform .12s;background:var(--line);}
.pip:hover{transform:scale(1.18);}
.read-del{background:none;border:none;color:var(--faint);cursor:pointer;font-size:13px;padding:0 0 0 4px;flex-shrink:0;opacity:0;transition:opacity .15s,color .2s;}
.read-row:hover .read-del{opacity:1;}
.read-del:hover{color:var(--sun);}
.add-row{display:flex;align-items:center;gap:8px;width:100%;padding:11px;margin-top:16px;border:1.5px dashed var(--line);border-radius:14px;background:none;cursor:pointer;color:var(--muted);font-size:13px;font-family:inherit;transition:border-color .2s,color .2s;}
.add-row:hover{border-color:var(--terra);color:var(--terra);}

/* ─── 일별 패널 ─── */
.day-head{font-size:14px;color:var(--muted);font-weight:600;margin-bottom:16px;}
.day-head b{color:var(--ink);font-weight:700;}
.ev-list{display:flex;flex-direction:column;gap:13px;}
.ev-row{display:flex;align-items:center;gap:11px;}
.ev-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.ev-name{font-size:15px;flex:1;min-width:0;}
.ev-name.em{font-weight:700;}
.ev-time{color:var(--muted);font-size:13px;margin-left:2px;}
.ev-del{background:none;border:none;color:var(--faint);cursor:pointer;font-size:13px;flex-shrink:0;opacity:0;transition:opacity .15s,color .2s;}
.ev-row:hover .ev-del{opacity:1;}
.ev-del:hover{color:var(--sun);}
.ev-empty{font-size:13.5px;color:var(--faint);padding:2px 0 4px;}
.add-ev{display:flex;align-items:center;gap:7px;margin-top:16px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;font-family:inherit;padding:4px 0;transition:color .2s;}
.add-ev:hover{color:var(--terra);}
.add-ev span{font-size:15px;}

/* ─── 메모 ─── */
.memo-label{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:9px;}
textarea.memo{width:100%;min-height:64px;border:1px solid var(--line);border-radius:14px;background:var(--soft);padding:13px 14px;font-family:'Nanum Myeongjo',serif;font-size:14.5px;color:var(--ink);resize:none;outline:none;line-height:1.85;transition:border-color .2s;}
textarea.memo:focus{border-color:var(--terra);}
textarea.memo::placeholder{color:var(--faint);}

/* ─── 습관 ─── */
.habit-list{display:flex;flex-direction:column;gap:16px;}
.habit-row{display:flex;flex-direction:column;gap:8px;}
.habit-top{display:flex;align-items:center;justify-content:space-between;}
.habit-id{display:flex;align-items:center;gap:8px;}
.habit-dot{width:9px;height:9px;border-radius:50%;}
.habit-name{font-size:14px;font-weight:500;}
.habit-cnt{font-size:11.5px;color:var(--muted);}
.habit-track{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:3px;}
.hcell{height:16px;border-radius:4px;background:var(--soft);cursor:pointer;transition:transform .1s;}
.hcell:hover{transform:scale(1.12);}
.hcell.future{opacity:.4;cursor:default;}
.hcell.future:hover{transform:none;}
.hcell.today-mk{box-shadow:inset 0 0 0 1.5px var(--terra);}

/* ─── 푸터 ─── */
.foot{margin-top:30px;text-align:center;font-size:12px;color:var(--faint);letter-spacing:0.04em;}
</style>
</head>
<body>
<div class="sheet">
  <div class="handle"></div>

  <div class="overline">MONTHLY PLANNER</div>
  <div class="head-row">
    <div>
      <span class="month-title" id="mTitle"></span>
      <span class="month-year" id="mYear"></span>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" id="prevBtn">‹</button>
      <button class="nav-btn" id="nextBtn">›</button>
    </div>
  </div>

  <div class="cal-grid" id="calGrid"></div>

  <div class="divider"></div>

  <!-- 이번 달 독서 -->
  <div class="sec-label">이번 달 독서</div>
  <div class="read-list" id="readList"></div>
  <button class="add-row" id="addReadBtn"><span style="font-size:15px;">＋</span> 독서 추가</button>

  <div class="divider"></div>

  <!-- 일별 패널 -->
  <div class="day-head" id="dayHead"></div>
  <div class="ev-list" id="evList"></div>
  <button class="add-ev" id="addEvBtn"><span>＋</span> 일정 추가</button>
  <div style="height:18px;"></div>
  <div class="memo-label">메모</div>
  <textarea class="memo" id="memo" placeholder="오늘의 한 줄 …"></textarea>

  <div class="divider"></div>

  <!-- 이번 달 습관 -->
  <div class="sec-label" id="habitLabel">이번 달 습관</div>
  <div class="habit-list" id="habitList"></div>

  <div class="foot" id="foot"></div>
</div>

<script>
// ════════════ 데이터 ════════════
const LS = { reads:'gabi-reads', habits:'gabi-habits', events:'gabi-events', memos:'gabi-memos' };
const SEED_VER = '202607d';   // 시드 갱신 시 이 값을 올리면 일정·독서가 새로 적용됨(습관·메모는 보존)
const load = (k,fb)=>JSON.parse(localStorage.getItem(k)||'null') ?? fb;

// 일정 카테고리 (색은 도서·활동 기준)

// 습관 (3종)

  {id:'sunlit',  name:'선릿모닝', color:'#E6D243'},  // 레몬

// 시드 버전이 바뀌면 일정·독서를 새로 적용 (습관 체크·메모는 유지)
if(localStorage.getItem('gabi-seedver') !== SEED_VER){
  localStorage.setItem(LS.events, JSON.stringify(seedEvents()));
  localStorage.setItem(LS.reads, JSON.stringify(seedReads()));
  localStorage.setItem('gabi-seedver', SEED_VER);
}

let READS  = load(LS.reads, seedReads());
let HABITS = load(LS.habits, {});
let EVENTS = load(LS.events, {});
let MEMOS  = load(LS.memos, {});

function save(){
  localStorage.setItem(LS.reads, JSON.stringify(READS));
  localStorage.setItem(LS.habits, JSON.stringify(HABITS));
  localStorage.setItem(LS.events, JSON.stringify(EVENTS));
  localStorage.setItem(LS.memos, JSON.stringify(MEMOS));
}

// ════════════ 상태/헬퍼 ════════════
const today = new Date();
let vY = today.getFullYear(), vM = today.getMonth();
let sel = fmt(today);
function fmt(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
const DOW=['일','월','화','수','목','금','토'];
const KOM=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// ════════════ 달력 ════════════
function renderCal(){
  document.getElementById('mTitle').textContent = KOM[vM];
  document.getElementById('mYear').textContent = vY;
  const grid = document.getElementById('calGrid');

  let html = DOW.map((d,i)=>`<div class="cal-dow${i===0?' s-sun':i===6?' s-sat':''}">${d}</div>`).join('');
  const first = new Date(vY,vM,1).getDay();
  const dim = new Date(vY,vM+1,0).getDate();
  const dpv = new Date(vY,vM,0).getDate();

  for(let i=first-1;i>=0;i--) html+=`<div class="cal-day other"><div class="cal-num">${dpv-i}</div></div>`;

  for(let d=1;d<=dim;d++){
    const dt=new Date(vY,vM,d), key=fmt(dt), dow=dt.getDay();
    const isToday=key===fmt(today), isSel=key===sel;
    let cls='cal-day';
    if(isToday)cls+=' today'; else if(isSel)cls+=' selected';
    if(dow===0)cls+=' s-sun'; if(dow===6)cls+=' s-sat';
    const evs=EVENTS[key]||[];
    const cats=[...new Set(evs.map(e=>e.cat))].slice(0,3);
    const dots=cats.map(c=>`<div class="day-dot" style="background:${catColor(c)}"></div>`).join('');
    html+=`<div class="${cls}" onclick="pick('${key}')"><div class="cal-num">${d}</div><div class="day-dots">${dots}</div></div>`;
  }
  const total=first+dim, rem=total%7===0?0:7-(total%7);
  for(let d=1;d<=rem;d++) html+=`<div class="cal-day other"><div class="cal-num">${d}</div></div>`;
  grid.innerHTML=html;
}
document.getElementById('prevBtn').onclick=()=>{ if(--vM<0){vM=11;vY--;} renderCal(); renderHabits(); };
document.getElementById('nextBtn').onclick=()=>{ if(++vM>11){vM=0;vY++;} renderCal(); renderHabits(); };
function pick(key){ sel=key; renderCal(); renderDay(); }

// ════════════ 독서 ════════════
function renderReads(){
  const el=document.getElementById('readList');
  if(!READS.length){ el.innerHTML=`<div class="ev-empty">아직 등록한 독서가 없어요</div>`; return; }
  el.innerHTML=READS.map(r=>{
    const steps = r.parts ? r.parts.length : (r.steps||0);
    let pips='';
    for(let i=0;i<steps;i++){
      const lbl = r.parts ? r.parts[i] : `${i+1}칸`;
      pips+=`<div class="pip" style="${i<r.done?`background:${r.color}`:''}" title="${esc(lbl)}" onclick="setPip('${r.id}',${i})"></div>`;
    }
    return `<div class="read-row">
      <div class="read-dot" style="background:${r.color}"></div>
      <div class="read-name">${esc(r.name)}</div>
      <div class="read-pips">${pips}</div>
      <button class="read-del" onclick="delRead('${r.id}')">✕</button>
    </div>`;
  }).join('');
}
function setPip(id,i){ const r=READS.find(x=>x.id===id); if(!r)return; r.done=(r.done===i+1)?i:i+1; save(); renderReads(); }
function delRead(id){ if(!confirm('이 독서 항목을 지울까요?'))return; READS=READS.filter(x=>x.id!==id); save(); renderReads(); }
document.getElementById('addReadBtn').onclick=()=>{
  const name=prompt('독서 이름 (예: 도란도란, 개인 도서)'); if(!name)return;
  let steps=parseInt(prompt('칸 수 (몇 권/회로 나눌까요?)','4'),10); if(!steps||steps<1)steps=4; if(steps>12)steps=12;
  const pal=['#E89AAE','#E6C24C','#B589D6','#2E4D6E','#5BB0DD','#C8845A'];
  READS.push({id:'r'+Date.now(),name,color:pal[READS.length%pal.length],steps,done:0});
  save(); renderReads();
};

// ════════════ 일별 패널 ════════════
function renderDay(){
  const [y,m,d]=sel.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const isToday=sel===fmt(today);
  document.getElementById('dayHead').innerHTML=`<b>${m}월 ${d}일</b> ${DOW[dt.getDay()]}요일${isToday?' · 오늘':''}`;

  const evs=EVENTS[sel]||[];
  const evEl=document.getElementById('evList');
  evEl.innerHTML = evs.length ? evs.map(e=>`
    <div class="ev-row">
      <div class="ev-dot" style="background:${catColor(e.cat)}"></div>
      <div class="ev-name${e.em?' em':''}">${esc(e.name)}${e.time?`<span class="ev-time">${esc(e.time)}</span>`:''}</div>
      <button class="ev-del" onclick="delEv('${e.id}')">✕</button>
    </div>`).join('') : `<div class="ev-empty">적어둔 일정이 없어요</div>`;

  const ta=document.getElementById('memo');
  ta.value=MEMOS[sel]||'';
  ta.oninput=()=>{ MEMOS[sel]=ta.value; save(); };
}
function delEv(id){
  EVENTS[sel]=(EVENTS[sel]||[]).filter(e=>e.id!==id);
  if(!EVENTS[sel].length) delete EVENTS[sel];
  save(); renderCal(); renderDay();
}
document.getElementById('addEvBtn').onclick=()=>{
  const name=prompt('일정 이름'); if(!name)return;
  const time=prompt('시간 (예: 10:00 — 비워도 됨)')||'';
  const menu=CATS.map((c,i)=>`${i+1}:${c.label}`).join('  ');
  let n=(prompt('분류 번호\n'+menu,'1')||'1').trim();
  const cat=(CATS[parseInt(n,10)-1]||CATS[0]).key;
  if(!EVENTS[sel])EVENTS[sel]=[];
  EVENTS[sel].push({id:'e'+Date.now(),name,time,cat});
  save(); renderCal(); renderDay();
};

// ════════════ 습관 ════════════
function renderHabits(){
  document.getElementById('habitLabel').textContent=`이번 달 습관 · ${KOM[vM]}`;
  const list=document.getElementById('habitList');
  const dim=new Date(vY,vM+1,0).getDate();
  const tk=fmt(today);
  list.innerHTML=HABIT_DEFS.map(h=>{
    let cells='',cnt=0;
    for(let d=1;d<=dim;d++){
      const key=fmt(new Date(vY,vM,d));
      const on=(HABITS[key]||{})[h.id];
      if(on)cnt++;
      const fut=new Date(vY,vM,d)>today && key!==tk;
      const isT=key===tk;
      cells+=`<div class="hcell${fut?' future':''}${isT?' today-mk':''}" style="${on?`background:${h.color}`:''}" ${fut?'':`onclick="toggleHabit('${key}','${h.id}')"`}></div>`;
    }
    return `<div class="habit-row">
      <div class="habit-top">
        <div class="habit-id"><span class="habit-dot" style="background:${h.color}"></span><span class="habit-name">${h.name}</span></div>
        <span class="habit-cnt">${cnt}일</span>
      </div>
      <div class="habit-track">${cells}</div>
    </div>`;
  }).join('');
}
function toggleHabit(key,hid){
  if(!HABITS[key])HABITS[key]={};
  HABITS[key][hid]=!HABITS[key][hid];
  if(!HABITS[key][hid])delete HABITS[key][hid];
  save(); renderHabits();
}

// ════════════ init ════════════
document.getElementById('foot').textContent=`pognaru_studio · ${today.getFullYear()}`;
renderCal(); renderReads(); renderDay(); renderHabits();
</script>
